name: security-audit
on:
  push:
    paths: ["**/Cargo.toml", "**/Cargo.lock", ".github/workflows/audit.yml"]
  schedule:
    - cron: "17 4 * * 1" # weekly, Monday 04:17 UTC
  workflow_dispatch:
jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
