name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2

      # Releases only ship if the full suite is green.
      - name: Test
        run: cargo test --workspace
      - name: Build server (release)
        run: cargo build --release -p flick-server
      - name: Build web client
        working-directory: web
        run: bun install --frozen-lockfile && bun run check && bun run build

      - name: Package
        run: |
          mkdir -p dist/flick
          cp target/release/flick-server dist/flick/
          cp -r web/dist dist/flick/web-dist
          cp README.md dist/flick/ 2>/dev/null || true
          tar -C dist -czf "flick-${GITHUB_REF_NAME}-linux-x86_64.tar.gz" flick

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: flick-*.tar.gz
