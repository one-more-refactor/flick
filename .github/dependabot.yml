# Keep the three dependency surfaces patched (docs/CONTRACTS.md: security).
version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      rust-minor:
        update-types: [minor, patch]
  - package-ecosystem: bun
    directory: /web
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
