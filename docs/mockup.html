<title>Speedread — design mockup</title>
<style>
  :root {
    --bg: #FAFAF7;
    --ink: #141110;
    --red: #E02D2D;
    --dim: #8A8380;
    --line: #E4E0DC;
    --panel: #FFFFFE;
    --inverse-ink: #FAFAF7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0B0A0A;
      --ink: #F2EFEC;
      --red: #F53B30;
      --dim: #7D7672;
      --line: #242020;
      --panel: #121010;
      --inverse-ink: #0B0A0A;
    }
  }
  :root[data-theme="dark"] {
    --bg: #0B0A0A;
    --ink: #F2EFEC;
    --red: #F53B30;
    --dim: #7D7672;
    --line: #242020;
    --panel: #121010;
    --inverse-ink: #0B0A0A;
  }
  :root[data-theme="light"] {
    --bg: #FAFAF7;
    --ink: #141110;
    --red: #E02D2D;
    --dim: #8A8380;
    --line: #E4E0DC;
    --panel: #FFFFFE;
    --inverse-ink: #FAFAF7;
  }

  * { box-sizing: border-box; }
  html, body { background: var(--bg); color: var(--ink); }
  body {
    font-family: ui-monospace, "JetBrains Mono", "Cascadia Mono", "SF Mono", Menlo, Consolas, monospace;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    justify-content: center;
    padding: 40px 16px 64px;
  }
  .sheet {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  /* ---------- header ---------- */
  header { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .wordmark { font-size: 20px; font-weight: 700; letter-spacing: 0.08em; }
  .wordmark .cursor { color: var(--red); animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .wordmark .cursor { animation: none; } }
  .tag { color: var(--dim); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; text-align: right; }

  /* ---------- panels ---------- */
  .panel {
    border: 1px solid var(--line);
    background: var(--panel);
  }
  .panel-label {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 14px;
    border-bottom: 1px solid var(--line);
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim);
  }
  .panel-label .counter { color: var(--red); letter-spacing: 0.1em; font-variant-numeric: tabular-nums; }

  /* ---------- reader ---------- */
  .stage {
    position: relative;
    height: 148px;
    display: flex; align-items: center;
    overflow: hidden;
  }
  .notch {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 1px; height: 14px; background: var(--red);
  }
  .notch.top { top: 22px; } .notch.bottom { bottom: 22px; }
  .rail {
    position: absolute; left: 14px; right: 14px; height: 1px; background: var(--line);
  }
  .rail.top { top: 36px; } .rail.bottom { bottom: 36px; }

  .word {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    font-size: 40px;
    font-weight: 700;
    letter-spacing: 0.01em;
    white-space: pre;
  }
  .word .pre  { text-align: right; }
  .word .orp  { color: var(--red); }
  .word .post { text-align: left; }

  .readout {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px;
    border-top: 1px solid var(--line);
    font-size: 11px; color: var(--dim);
    font-variant-numeric: tabular-nums;
  }
  .readout b { color: var(--red); font-weight: 700; }

  .controls {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 14px;
    border-top: 1px solid var(--line);
  }
  button.play {
    font: inherit;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    background: var(--ink); color: var(--inverse-ink);
    border: none; padding: 8px 18px; cursor: pointer;
    min-width: 92px;
  }
  button.play:hover { background: var(--red); }
  button.play:focus-visible { outline: 2px solid var(--red); outline-offset: 2px; }

  .wpm-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
  input[type="range"] {
    flex: 1; appearance: none; -webkit-appearance: none;
    height: 2px; background: var(--line); outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    appearance: none; -webkit-appearance: none;
    width: 14px; height: 14px; border-radius: 0;
    background: var(--red); cursor: ew-resize;
  }
  input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 0; border: none;
    background: var(--red); cursor: ew-resize;
  }
  input[type="range"]:focus-visible { outline: 2px solid var(--red); outline-offset: 4px; }
  .wpm-val { font-size: 11px; color: var(--ink); min-width: 64px; text-align: right; font-variant-numeric: tabular-nums; }
  .wpm-val b { color: var(--red); }

  .progress { height: 2px; background: var(--line); }
  .progress .fill { height: 100%; width: 0%; background: var(--red); }

  /* ---------- library ---------- */
  .lib { list-style: none; margin: 0; padding: 6px 0; }
  .lib li {
    display: flex; align-items: baseline; gap: 10px;
    padding: 9px 14px;
    cursor: pointer;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  .lib .idx { color: var(--dim); font-size: 11px; }
  .lib .title { text-transform: uppercase; letter-spacing: 0.06em; }
  .lib .leader {
    flex: 1;
    border-bottom: 1px dotted var(--dim);
    transform: translateY(-4px);
    opacity: 0.5;
  }
  .lib .pct { color: var(--red); font-size: 12px; }
  .lib li.sel, .lib li:hover { background: var(--ink); }
  .lib li.sel .title, .lib li:hover .title { color: var(--inverse-ink); }
  .lib li.sel .idx, .lib li:hover .idx { color: var(--inverse-ink); opacity: 0.6; }
  .lib li.sel .pct, .lib li:hover .pct { color: var(--red); }
  .lib li.sel .idx::before { content: "▶ "; color: var(--red); }
  .hint {
    padding: 8px 14px; border-top: 1px solid var(--line);
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--dim);
  }
  .hint b { color: var(--red); font-weight: 400; }

  /* ---------- tokens ---------- */
  .tokens { display: flex; gap: 10px; flex-wrap: wrap; }
  .tok { display: flex; align-items: center; gap: 7px; font-size: 10px; color: var(--dim); letter-spacing: 0.08em; }
  .tok .chip { width: 14px; height: 14px; border: 1px solid var(--line); }
</style>

<div class="sheet">
  <header>
    <div class="wordmark">READ<span class="cursor">_</span></div>
    <div class="tag">design mockup<br>web · ios · android · tui</div>
  </header>

  <!-- READER -->
  <section class="panel" aria-label="Reader">
    <div class="panel-label"><span>Reader</span><span class="counter" id="count">000 / 044</span></div>
    <div class="stage">
      <div class="rail top"></div><div class="rail bottom"></div>
      <div class="notch top"></div><div class="notch bottom"></div>
      <div class="word" id="word">
        <span class="pre">rea</span><span class="orp">d</span><span class="post">ing</span>
      </div>
    </div>
    <div class="progress"><div class="fill" id="fill"></div></div>
    <div class="controls">
      <button class="play" id="play">Play</button>
      <div class="wpm-wrap">
        <input type="range" id="wpm" min="150" max="800" step="25" value="350" aria-label="Words per minute">
        <div class="wpm-val"><b id="wpmv">350</b> wpm</div>
      </div>
    </div>
  </section>

  <!-- LIBRARY -->
  <section class="panel" aria-label="Library">
    <div class="panel-label"><span>Library</span><span class="counter">4 books</span></div>
    <ul class="lib">
      <li class="sel"><span class="idx">01</span><span class="title">The Art of War</span><span class="leader"></span><span class="pct">62%</span></li>
      <li><span class="idx">02</span><span class="title">Meditations</span><span class="leader"></span><span class="pct">18%</span></li>
      <li><span class="idx">03</span><span class="title">Flatland</span><span class="leader"></span><span class="pct">00%</span></li>
      <li><span class="idx">04</span><span class="title">Walden</span><span class="leader"></span><span class="pct">91%</span></li>
    </ul>
    <div class="hint">↑↓ select · <b>enter</b> read · <b>a</b> add book (pdf)</div>
  </section>

  <!-- TOKENS -->
  <footer class="tokens">
    <span class="tok"><span class="chip" style="background:#E02D2D"></span>signal red</span>
    <span class="tok"><span class="chip" style="background:#141110"></span>ink</span>
    <span class="tok"><span class="chip" style="background:#FAFAF7"></span>paper</span>
    <span class="tok"><span class="chip" style="background:#8A8380"></span>warm grey</span>
    <span class="tok">mono · both themes · red only accent</span>
  </footer>
</div>

<script>
  const TEXT = "You are reading one word at a time. The red letter anchors your eye, so it never has to move. Longer words linger a little; punctuation buys you a breath. Slide up to 800 and feel where your limit really is.";
  const words = TEXT.split(/\s+/);

  // Optimal Recognition Point — slightly left of center.
  function orp(w) {
    const len = w.replace(/[^\w'’]/g, "").length || w.length;
    if (len <= 1) return 0;
    if (len <= 5) return 1;
    if (len <= 9) return 2;
    if (len <= 13) return 3;
    return 4;
  }
  // Per-word duration: base + long-word and punctuation dwell.
  function dwell(w, base) {
    let d = base;
    if (w.length > 8) d *= 1.3;
    if (/[,;:]$/.test(w)) d *= 1.6;
    if (/[.!?]$/.test(w)) d *= 2.1;
    return d;
  }

  const wordEl = document.getElementById("word");
  const fill = document.getElementById("fill");
  const count = document.getElementById("count");
  const playBtn = document.getElementById("play");
  const wpmInput = document.getElementById("wpm");
  const wpmVal = document.getElementById("wpmv");

  let i = 0, playing = false, timer = null;
  const pad = n => String(n).padStart(3, "0");

  function show(idx) {
    const w = words[idx];
    const p = orp(w);
    wordEl.innerHTML =
      '<span class="pre"></span><span class="orp"></span><span class="post"></span>';
    wordEl.children[0].textContent = w.slice(0, p);
    wordEl.children[1].textContent = w[p] || "";
    wordEl.children[2].textContent = w.slice(p + 1);
    fill.style.width = ((idx + 1) / words.length * 100) + "%";
    count.textContent = pad(idx + 1) + " / " + pad(words.length);
  }

  function tick() {
    if (!playing) return;
    show(i);
    const base = 60000 / Number(wpmInput.value);
    const d = dwell(words[i], base);
    i++;
    if (i >= words.length) { stop(); i = 0; return; }
    timer = setTimeout(tick, d);
  }
  function start() {
    playing = true;
    playBtn.textContent = "Pause";
    tick();
  }
  function stop() {
    playing = false;
    clearTimeout(timer);
    playBtn.textContent = "Play";
  }

  playBtn.addEventListener("click", () => playing ? stop() : start());
  wpmInput.addEventListener("input", () => { wpmVal.textContent = wpmInput.value; });

  show(0);
  count.textContent = "001 / " + pad(words.length);
</script>
